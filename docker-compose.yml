services:
  whatsapp-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: whatsapp-api
    restart: unless-stopped
    ports:
      - "${WHATSAPP_API_HTTP_PORT:-7000}:${WHATSAPP_API_HTTP_PORT:-7000}"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: ${WHATSAPP_API_HTTP_PORT:-7000}
      PUPPETEER_HEADLESS: "true"
      CHROME_EXECUTABLE_PATH: /usr/bin/chromium
      WWEBJS_AUTH_PATH: /app/.wwebjs_auth
      DATA_DIR: /app/data
      UPLOAD_DIR: /app/uploads
      PERSISTENCE_DRIVER: ${PERSISTENCE_DRIVER:-postgres}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_SSL: ${POSTGRES_SSL:-false}
      QUEUE_DRIVER: ${QUEUE_DRIVER:-memory}
      REDIS_URL: ${REDIS_URL:-}
    volumes:
      - ./.wwebjs_auth:/app/.wwebjs_auth
      - ./data:/app/data
      - ./uploads:/app/uploads
    shm_size: "1gb"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:' + (process.env.PORT || 7000) + '/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
